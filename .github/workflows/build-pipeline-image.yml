name: Build And Push Pipeline Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/Pipeline.Dockerfile"
      - "backend/requirements-pipeline.txt"
      - "backend/requirements-api.txt"
      - "backend/app/jobs/**"
      - "backend/app/services/sentiment/**"
      - "backend/app/services/ingesting_pipelines/**"
      - ".github/workflows/build-pipeline-image.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-pipeline-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    #build from forked repo due to permissions issues
    if: github.repository == 'katiejones404/ai_roosters_'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        shell: bash
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          echo "Disk after cleanup:"
          df -h

      - name: Compute image name
        shell: bash
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/stocksense-pipeline" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push pipeline image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Pipeline.Dockerfile
          push: true
          provenance: false
          sbom: false
          build-args: |
            PRELOAD_FINBERT=0
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
