name: Build And Push API Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/API.Dockerfile"
      - "backend/requirements-api.txt"
      - "backend/app/**"
      - ".github/workflows/build-api-image.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-api-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    #build from forked repo due to permissions issues
    if: github.repository == 'katiejones404/ai_roosters_'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        shell: bash
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/stocksense-api" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/API.Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Deployment note
        run: |
          echo "Image pushed to GHCR."
          echo "Deploy to Azure manually from local machine:"
          echo "cd azuredeployment && source .deploy.env && bash deploy_update.sh"
