services:
  postgres:
    image: postgres:15
    container_name: stock_postgres
    environment:
      POSTGRES_DB: stock_db
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user -d stock_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Backend.Dockerfile
    container_name: stock_backend
    environment:
      DATABASE_URL: postgresql://stock_user:stock_pass@postgres:5432/stock_db
      INPUT_JSON: /app/data/reliance_news.json
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: stock_db
      PG_USER: stock_user
      PG_PASS: stock_pass
      KAGGLE_CONFIG_DIR: /root/.kaggle
      NEWS_CSV_PATH: /app/data/reliance_news_sentiment.csv
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./Testing:/app/Testing
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  notebook:
    build:
      context: ./backend
      dockerfile: Backend.Dockerfile
    container_name: stock_notebook
    environment:
      DATABASE_URL: postgresql://stock_user:stock_pass@postgres:5432/stock_db
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: stock_db
      PG_USER: stock_user
      PG_PASS: stock_pass
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8888:8888"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./Testing:/app/Testing
    command: >
      sh -c "python -m pip install -U pip &&
             python -m pip install -U jupyter ipykernel &&
             jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
             --ServerApp.token='' --ServerApp.password='' --ServerApp.allow_origin='*'"

  frontend:
    build:
      context: ./frontend
      dockerfile: Frontend.Dockerfile
    container_name: stock_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host"]
    restart: unless-stopped

volumes:
  postgres_data: