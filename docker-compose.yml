services:
  postgres:
    image: postgres:15
    container_name: stock_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock_db}
      POSTGRES_USER: ${POSTGRES_USER:-stock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stock_user} -d ${POSTGRES_DB:-stock_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: API.Dockerfile
    container_name: stock_api
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${POSTGRES_DB:-stock_db}
      PG_USER: ${POSTGRES_USER:-stock_user}
      PG_PASS: ${POSTGRES_PASSWORD:-stock_pass}
      RUN_ARTICLE_INGEST: "1"

      # --- GPT explanations (server-side only) ---
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENABLE_GPT_EXPLANATIONS: ${ENABLE_GPT_EXPLANATIONS:-0}
      GPT_EXPL_MODEL: ${GPT_EXPL_MODEL:-gpt-4o-mini}
      GPT_EXPL_MAX_TICKERS: ${GPT_EXPL_MAX_TICKERS:-50}

    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./Testing:/app/Testing
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  pipeline:
    build:
      context: ./backend
      dockerfile: Pipeline.Dockerfile
    container_name: stock_pipeline
    env_file: .env
    environment:
      KAGGLE_CONFIG_DIR: /root/.kaggle
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${POSTGRES_DB:-stock_db}
      PG_USER: ${POSTGRES_USER:-stock_user}
      PG_PASS: ${POSTGRES_PASSWORD:-stock_pass}

      # Hugging Face auth + cache
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN}
      HF_TOKEN: ${HUGGINGFACE_HUB_TOKEN}
      HF_HOME: ${HF_HOME:-/cache/huggingface}

      # DB-first FinBERT controls (optional)
      FINBERT_FETCH_LIMIT: ${FINBERT_FETCH_LIMIT:-1000}
      FINBERT_BATCH_SIZE: ${FINBERT_BATCH_SIZE:-8}
      FINBERT_DB_BATCH_SIZE: ${FINBERT_DB_BATCH_SIZE:-250}
      FINBERT_ONLY_MISSING: ${FINBERT_ONLY_MISSING:-true}
      FINBERT_STOCKS: ${FINBERT_STOCKS:-}
      FINBERT_START_DATE: ${FINBERT_START_DATE:-}
      FINBERT_END_DATE: ${FINBERT_END_DATE:-}

      # --- GPT explanations (pipeline stage) ---
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENABLE_GPT_EXPLANATIONS: ${ENABLE_GPT_EXPLANATIONS:-0}
      GPT_EXPL_MODEL: ${GPT_EXPL_MODEL:-gpt-4o-mini}
      GPT_EXPL_MAX_TICKERS: ${GPT_EXPL_MAX_TICKERS:-50}

    profiles:
      - pipeline
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./Testing:/app/Testing
      - hf_cache:${HF_HOME:-/cache/huggingface}

  frontend:
    build:
      context: ./frontend
      dockerfile: Frontend.Dockerfile
    container_name: stock_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: ["npm", "run", "dev", "--", "--host"]
    restart: unless-stopped

volumes:
  postgres_data:
  hf_cache: