services:
  backend:
    build:
      context: ./Backend
      dockerfile: Backend.Dockerfile.jetson
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Helps reduce fragmentation / allocator failures on Jetson.
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True,max_split_size_mb:64"
    # Jetson commonly uses the NVIDIA Container Runtime
    runtime: nvidia
    # `gpus: all` is supported by modern docker compose (non-swarm)
    gpus: all
