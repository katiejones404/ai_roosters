services:
  backend:
    build:
      context: ./backend
      dockerfile: Backend.Dockerfile.gpu
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True,max_split_size_mb:64"
    cpus: "16"
    mem_limit: "64g"
